<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetPal - Edit Profile</title>
    <!--tailwind setup-->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen font-sans text-black">

    <!-- SITE HEADER -->
    <header>
        <div class="bg-white border-b border-gray-200">
            <div class="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
                <h1 class="text-2xl font-extrabold tracking-tight">PetPal</h1>
                <a href="../index.html"
                    class="text-sm font-semibold text-gray-500 hover:text-black transition-colors">Logout</a>
            </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-10 space-y-6">

        <!-- EDIT PROFILE -->
        <section class="bg-white border border-gray-200 rounded-xl shadow-sm p-8">
            <h3 class="text-xs text-center text-gray-500 uppercase tracking-widest font-semibold mb-6">
                Edit Profile
            </h3>
            <form class="space-y-6">
                <div class="flex flex-col sm:flex-row gap-6 items-start">
                    <div class="flex-1 w-full">
                        <form class="space-y-6">
                            <div class="flex flex-col sm:flex-row gap-6 items-start">
                                <img src="content/provider-profile.png" alt="Profile picture"
                                    class="w-24 h-24 rounded-full object-cover border border-gray-200 flex-shrink-0">
                                <div class="flex-1 w-full">
                                    <label
                                        class="block text-xs text-gray-500 uppercase tracking-widest font-semibold mb-2 mt-8">
                                        Profile Image Link
                                    </label>
                                    <input type="text" value="content/provider-profile.png"
                                        placeholder="Paste an image URL"
                                        class="w-full px-6 py-4 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition-all">
                                </div>
                            </div>
                            <div>
                                <label
                                    class="block text-xs text-gray-500 uppercase tracking-widest font-semibold mb-2 mt-8">
                                    Name
                                </label>
                                <input type="text" value="Sarah Young"
                                    class="w-full px-6 py-4 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition-all">
                            </div>
                            <div>
                                <label
                                    class="block text-xs text-gray-500 uppercase tracking-widest font-semibold mb-2 mt-8">
                                    Description
                                </label>
                                <textarea rows="8"
                                    class="w-full px-6 py-4 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition-all">
The dog (Canis familiaris or Canis lupus familiaris) is a domesticated descendant of wolves. Also called the domestic dog, it was selectively bred during the Late Pleistocene by hunter-gatherers. Dogs and the modern gray wolf share a common ancestor. Dogs were the first species to be domesticated over 14,000 years ago, before the development of agriculture, though genetic studies suggest the domestication process may have begun over 25,000 years ago. Due to their long association with humans, dogshave gained the ability to thrive on a starch-rich diet that would be inadequate for other canids.
Dogs have been bred for desired behaviors, sensory capabilities, and physical attributes. Dog breeds vary widely in shape, size, and color. They have the same number of bones (with the exception of the tail), powerful jaws that house around 42 teeth, and well-developed senses of smell, hearing, and sight. Compared to humans, dogs possess a superior sense of smell and hearing, but inferior visual acuity. Dogs perform many roles for humans, such as hunting, herding, pulling loads, protection, companionship, therapy, aiding disabled people, and assisting police and the military.
Communication in dogs includes eye gaze, facial expression, vocalization, body posture (including movements of bodies and limbs), and chemical communication (scents, pheromones, and taste). They mark their territories by urinating on them, which is more likely when entering a new environment. Over the millennia, dogs have uniquely adapted to human behavior; this adaptation includes being able to understand and communicate with humans. As such, the human–canine bond has been a topic of frequent study, and dogs' influence on human society has given them the sobriquet of "man's best friend".
The global dog population is estimated at 700 million to 1 billion, distributed around the world. The dog is the most popular pet in the United States, present in 34–40% of households. Developed countries make up approximately 20% of the global dog population, while around 75% of dogs are estimated to be from developing countries, mainly in the form of feral and street dogs. 
                                </textarea>
                            </div>

                            <div class="flex gap-4">
                                <a href="dashboard.html"
                                    class="flex justify-center flex-1 px-6 py-4 mt-8 text-white bg-black rounded-lg hover:bg-gray-500 transition-colors font-medium shadow-sm">
                                    Save
                                </a>
                                <a href="dashboard.html"
                                    class="flex justify-center flex-1 px-6 py-4 mt-8 text-white bg-black rounded-lg hover:bg-gray-500 transition-colors font-medium shadow-sm">
                                    Cancel
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </form>
        </section>

        <!-- DELETE ACCOUNT BUTTON  -->
        <div class="flex justify-center">
            <a href="dashboard.html"
                class="flex justify-center px-6 py-4 text-red bg-white border-2 border-red rounded-lg hover:bg-red-500 transition-colors font-medium">
                Delete Account
            </a>
        </div>

    </main>

    <!-- SITE FOOTER-->
    <footer>
        <div>
            <p>PetPal. Copyright lololol. No rights reserved. (<a href="https://github.com/eabeil/su26-Team8">Source
                    Code</a>)</p>
        </div>
    </footer>
</body>

</html>
