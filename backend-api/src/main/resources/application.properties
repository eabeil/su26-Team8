spring.application.name=PetPal
spring.datasource.url=${DATABASE_URL}

#Log out sql queries
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
spring.jpa.hibernate.ddl-auto=update
logging.level.org.springframework.web=DEBUG

# Enable lots of debug stuff to aid development
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet=DEBUG
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true
logging.level.freemarker=DEBUG
logging.level.org.springframework.web.servlet.view.freemarker=DEBUG
logging.level.org.springframework.boot.web.servlet.error=DEBUG
logging.level.org.springframework.boot.autoconfigure.web=DEBUG
server.error.include-stacktrace=always
server.error.include-message=always
server.error.include-exception=true
logging.level.org.apache.catalina=DEBUG
logging.level.org.apache.coyote=DEBUG